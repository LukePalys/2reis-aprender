        }
        .dark .btn-selected {

        .path-node {

        .path-line { width: 8px; height: 50px; background: #e5e7eb; margin: -5px auto; position: relative; z-index: 0; }
        .dark .path-line { background: #334155; }

        /* Animações */
        .slide-in { animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        .verse-card { background: #fffbeb; border-left: 4px solid #f59e0b; font-family: 'Georgia', serif; }

        // --- ESTADO E LÓGICA ---
        let currentLesson = null;
        let currentStep = 0;
        let phase = 'study';
        let hearts = 5;
        let xp = 0;
        let selectedOption = null;
        let lessonsCompleted = new Array(lessons.length).fill(false);

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        });

        function toggleDarkMode() {
            const html = document.documentElement;
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            
            html.classList.toggle('dark');
            body.classList.toggle('dark');
            
            if (html.classList.contains('dark')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.theme = 'dark';
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.theme = 'light';
            }
        }

        function toggleAchievements() {
            const modal = document.getElementById('modal-achievements');
            const list = document.getElementById('achievements-list');
            
            if (modal.classList.contains('hidden')) {
                list.innerHTML = achievements.map(ach => `
                    <div class="flex items-center gap-4 p-3 rounded-xl border-b border-slate-100 dark:border-slate-700 ${ach.unlocked ? 'bg-yellow-50 dark:bg-yellow-900/20' : 'opacity-50'}">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl ${ach.unlocked ? 'bg-yellow-400 text-white shadow-md' : 'bg-slate-200 dark:bg-slate-700 text-slate-400'}">
                            <i class="fas ${ach.icon}"></i>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800 dark:text-slate-200">${ach.title}</h4>
                            <p class="text-xs text-slate-500 dark:text-slate-400">${ach.description}</p>
                        </div>
                        ${ach.unlocked ? '<i class="fas fa-check text-green-500"></i>' : '<i class="fas fa-lock text-slate-300"></i>'}
                    </div>
                `).join('');
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function unlockAchievement(id) {
            const ach = achievements.find(a => a.id === id);
            if (ach && !ach.unlocked) {
                ach.unlocked = true;
                const badge = document.getElementById('badge-notify');
                badge.classList.remove('hidden');
                setTimeout(() => badge.classList.add('hidden'), 3000);
            }
        }

        function openLessonModal(id) {
            currentLesson = lessons[id];
            document.getElementById('modal-lesson-title').innerText = currentLesson.title;
            document.getElementById('modal-lesson-chapters').innerText = currentLesson.chapters;
            document.getElementById('modal-choice').classList.remove('hidden');
        }

        function closeModalChoice() {
            document.getElementById('modal-choice').classList.add('hidden');
        }

        function showContext() {
            const ctx = document.getElementById('modal-context');
            document.getElementById('context-content').innerHTML = `
                <div class="space-y-4">
                    <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl">
                        <h4 class="font-bold text-blue-700 dark:text-blue-300 mb-2"><i class="fas fa-info-circle mr-2"></i>Resumo</h4>
                        <p>${currentLesson.overview}</p>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-800 dark:text-white mb-2">Contexto Histórico</h4>
                        <p>O Reino do Norte (Israel) vivia sob a dinastia de Onri e Acabe, marcada pela idolatria a Baal. Os profetas Elias e Eliseu foram levantados por Deus não apenas para pregar, mas para demonstrar poder superior aos falsos deuses através de milagres e controle sobre a natureza e a política.</p>
                    </div>
                    <div class="p-3 border-l-4 border-yellow-400 bg-yellow-50 dark:bg-yellow-900/10">
                        <p class="text-sm italic">"A sucessão de Elias para Eliseu marca a transição de um ministério de confronto (fogo) para um de misericórdia e milagres (graça), embora o julgamento ainda estivesse presente."</p>
                    </div>
                </div>
            `;
            ctx.classList.remove('hidden');
        }

        function closeContext() {
            document.getElementById('modal-context').classList.add('hidden');
        }

        function startPhase(p) {
            phase = p;
            currentStep = 0;
            closeModalChoice();
            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-lesson').classList.remove('hidden');
            renderLessonStep();
        }

        function renderLessonStep() {
            const content = document.getElementById('lesson-content');
            const feedback = document.getElementById('feedback-area');
            const btnCheck = document.getElementById('btn-check');
            const btnCont = document.getElementById('btn-continue');
            
            feedback.classList.add('hidden');
            btnCheck.classList.remove('hidden');
            btnCont.classList.add('hidden');
            selectedOption = null;
            
            const total = phase === 'study' ? currentLesson.study.length : currentLesson.challenge.length;
            const pct = ((currentStep) / total) * 100;
            document.querySelector('.progress-fill').style.width = pct + '%';

            if (phase === 'study') {
                const item = currentLesson.study[currentStep];
                btnCheck.innerText = "ENTENDI";
                content.innerHTML = `
                    <div class="slide-in flex flex-col items-center text-center space-y-6">
                        <div class="w-32 h-32 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center text-6xl text-blue-500 dark:text-blue-400 shadow-inner mb-4">
                            <i class="fas ${item.i}"></i>
                        </div>
                        <h2 class="text-2xl font-black text-slate-700 dark:text-white">${item.t}</h2>
                        <p class="text-lg text-slate-600 dark:text-slate-300 leading-relaxed max-w-md">${item.details}</p>
                        <div class="verse-card p-4 rounded-xl mt-4 w-full text-left shadow-sm">
                            <p class="text-amber-800 dark:text-amber-400 italic text-sm font-medium"><i class="fas fa-quote-left mr-2 opacity-50"></i>${item.verse}</p>
                        </div>
                    </div>
                `;
            } else {
                const item = currentLesson.challenge[currentStep];
                btnCheck.innerText = "VERIFICAR";
                content.innerHTML = `
                    <div class="slide-in w-full max-w-md">
                        <h2 class="text-xl font-bold text-slate-700 dark:text-white mb-6">${item.q}</h2>
                        <div class="space-y-3">
                            ${item.o.map((opt, i) => `
                                <button onclick="selectOption(${i})" id="opt-${i}" class="btn-neutral w-full p-4 rounded-xl text-left font-bold text-slate-600 dark:text-slate-300 btn-3d transition-all flex items-center justify-between group">
                                    <span>${opt}</span>
                                    <div class="w-6 h-6 rounded-full border-2 border-slate-200 dark:border-slate-600 group-hover:border-slate-300 dark:group-hover:border-slate-500"></div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        function selectOption(idx) {
            if (!document.getElementById('feedback-area').classList.contains('hidden')) return;
            selectedOption = idx;
            document.querySelectorAll('#lesson-content button').forEach(b => {
                b.classList.remove('btn-selected');
                b.classList.add('btn-neutral');
            });
            const btn = document.getElementById(`opt-${idx}`);
            btn.classList.remove('btn-neutral');
            btn.classList.add('btn-selected');
        }

        function checkAnswer() {
            if (phase === 'study') {
                nextStep();
                return;
            }
            if (selectedOption === null) return;

            const item = currentLesson.challenge[currentStep];
            const feedback = document.getElementById('feedback-area');
            const fbTitle = document.getElementById('feedback-title');
            const fbText = document.getElementById('feedback-text');
            const fbIcon = document.getElementById('feedback-icon');
            const btnCheck = document.getElementById('btn-check');
            const btnCont = document.getElementById('btn-continue');

            btnCheck.classList.add('hidden');
            btnCont.classList.remove('hidden');
            feedback.classList.remove('hidden');

            const correctBtn = document.getElementById(`opt-${item.a}`);
            const selectedBtn = document.getElementById(`opt-${selectedOption}`);

            if (selectedOption === item.a) {
                feedback.className = "mb-4 rounded-2xl p-4 flex items-start gap-3 bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-400 animate-bounce-short";
                fbIcon.innerHTML = '<i class="fas fa-check"></i>';
                fbIcon.className = "text-2xl bg-white dark:bg-slate-800 text-green-500 rounded-full w-10 h-10 flex items-center justify-center shadow-sm";
                fbTitle.innerText = "Incrível!";
                fbText.innerText = "Resposta correta!";
                selectedBtn.classList.remove('btn-selected');
                selectedBtn.classList.add('btn-correct');
                xp += 10;
                updateUI();
            } else {
                feedback.className = "mb-4 rounded-2xl p-4 flex items-start gap-3 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-400 animate-shake";
                fbIcon.innerHTML = '<i class="fas fa-times"></i>';
                fbIcon.className = "text-2xl bg-white dark:bg-slate-800 text-red-500 rounded-full w-10 h-10 flex items-center justify-center shadow-sm";
                fbTitle.innerText = "Solução Correta:";
                fbText.innerText = `${item.o[item.a]} - ${item.explanation}`;
                selectedBtn.classList.remove('btn-selected');
                selectedBtn.classList.add('btn-wrong');
                correctBtn.classList.remove('btn-neutral');
                correctBtn.classList.add('btn-correct');
                hearts--;
                updateUI();
                if (hearts <= 0) {
                    alert("Seus corações acabaram! Revise o material.");
                    exitLesson();
                    hearts = 5;
                    updateUI();
                }
            }
        }

        function nextStep() {
            const total = phase === 'study' ? currentLesson.study.length : currentLesson.challenge.length;
            
            if (currentStep < total - 1) {
                currentStep++;
                renderLessonStep();
            } else {
                if (phase === 'challenge') {
                    if (!lessonsCompleted[currentLesson.id]) {
                        lessonsCompleted[currentLesson.id] = true;
                        xp += 50;
                        unlockAchievement('first_lesson');
                        if (currentLesson.id === 0) unlockAchievement('fire_master');
                        if (currentLesson.id === 1) unlockAchievement('jordan_crosser');
                        if (currentLesson.id === 2 || currentLesson.id === 3) unlockAchievement('miracle_worker');
                        if (currentLesson.id === 4) unlockAchievement('healing_river');
                        if (lessonsCompleted.every(l => l)) unlockAchievement('biblical_scholar');
                    }
                    if (hearts === 5) unlockAchievement('challenge_master');
                } else {
                    xp += 20;
                }
                
                if (xp >= 500) unlockAchievement('xp_collector');
                
                alert(phase === 'study' ? "Leitura concluída! +20 XP" : "Desafio vencido! +50 XP");
                updateUI();
                exitLesson();
            }
        }

        function exitLesson() {
            document.getElementById('view-map').classList.remove('hidden');
            document.getElementById('view-lesson').classList.add('hidden');
        }

        function exitLessonConfirm() {
            if(confirm("Sair agora perderá o progresso desta lição.")) {
                exitLesson();
            }
        }

        function updateUI() {
            document.getElementById('xp-display').innerText = xp;
            document.getElementById('hearts-display').innerText = hearts;
            document.getElementById('lesson-hearts').innerText = hearts;
        }
    </script>
</body>
</html>
